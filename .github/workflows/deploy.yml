name: release

# On push to main (or manual dispatch): test, build the static linux binary
# (assets embedded), and publish it as the "latest" GitHub Release asset. The VM
# pulls that asset on a timer (deploy/update.sh) — no SSH, no secrets.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./go/...

      - name: Build static linux/amd64 binary (assets embedded)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o honeypot ./honeypot/server

      - name: Publish to the "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest --title latest --notes "auto build ${{ github.sha }}" 2>/dev/null || true
          gh release upload latest honeypot --clobber
