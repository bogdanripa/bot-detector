<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thanks — submission received</title>
<script type="application/json" id="bd-bootstrap">__BD_BOOTSTRAP__</script>
<style>
  :root { color-scheme: light dark; }
  body { font: 16px/1.55 system-ui, sans-serif; max-width: 46rem; margin: 0 auto; padding: 2rem 1.2rem; }
  h1 { font-size: 1.5rem; }
  .note { color: #777; }
  dl.bd-submitted { display: grid; grid-template-columns: max-content 1fr; gap: .4rem 1rem; margin: 1.2rem 0;
                    border: 1px solid #8884; border-radius: 10px; padding: 1rem 1.2rem; }
  dl.bd-submitted dt { font-weight: 700; color: #555; }
  @media (prefers-color-scheme: dark) { dl.bd-submitted dt { color: #aaa; } }
  dl.bd-submitted dd { margin: 0; white-space: pre-wrap; word-break: break-word; }
  a.again { display: inline-block; margin-top: 1.5rem; color: #0969da; }
</style>
</head>
<body>
  <h1>Thanks — here's what you submitted</h1>
  <!-- Detection report lives in the sidebar (__BD_CHECKS__). This main content
       is the app's confirmation: the form data, echoed from the browser. -->
  __BD_CHECKS__
  <div id="bd-report">Loading your submission…</div>
  <a class="again" href="/">↺ Run it again</a>
  <script src="/botdetect.js" defer></script>
</body>
</html>
